<!doctype html>
<html lang="fr">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Site 1 - Contactez-nous !</title>
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Playwrite+IE:wght@100..400&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
			rel="stylesheet"
		/>
		<link rel="stylesheet" href="texte.css" />
	</head>
	<body>
		<header>
			<h1>Hello Couvin</h1>
			<nav>
				<a href="index.html">Home</a>
				<a href="contact.html">Contact</a>
			</nav>
		</header>
		<main>
			<section>
				<h2>Contactez-nous !</h2>
				<div class="colonnes">
					<div class="colonne">
						<h3>Par email</h3>
						<form>
							<div class="control">
								<label for="lastname">Nom:</label>
								<input type="text" id="lastname" required />*
							</div>
							<div class="control">
								<label for="firstname">Prénom:</label>
								<input type="text" id="firstname" />
							</div>
							<div class="control">
								<label for="email">Email</label>
								<input type="email" required id="email" placeholder="user@site.com" />*
							</div>
							<div class="control">
								<label for="profil">Profil:</label>
								<select name="" id="profil">
									<option value="DE">Demandeur d'emploi</option>
									<option value="TRAV">Travailleur</option>
								</select>
							</div>
							<div class="control">
								<label for="message">Message:</label>
								<textarea name="" id="message"></textarea>*
							</div>
							<div class="control">
								<label for=""></label>
								<button>Envoyer</button>
							</div>
						</form>
					</div>
					<div class="colonne">
						<iframe
							width="425"
							height="350"
							src="https://www.openstreetmap.org/export/embed.html?bbox=4.475920200347901%2C50.04731524977622%2C4.503514766693116%2C50.056794366590104&amp;layer=mapnik"
							style="border: 1px solid black"
						></iframe
						><br /><small
							><a href="https://www.openstreetmap.org/?#map=16/50.05206/4.48972"
								>Afficher une carte plus grande</a
							></small
						>
					</div>
				</div>
			</section>
		</main>
	</body>
</html>
